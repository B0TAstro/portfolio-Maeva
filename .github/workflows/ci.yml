name: 🧪 CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  quality:
    name: 🧪 Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v7

      - name: 🧰 Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧹 Lint and typecheck
        run: npm run lint:fix

      - name: 🎨 Check formatting
        run: npm run format:check

      - name: 🏗️ Build
        run: npm run build
