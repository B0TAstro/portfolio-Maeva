name: 🚀 Deploy Site to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  PUBLIC_SANITY_PROJECT_ID: ${{ vars.PUBLIC_SANITY_PROJECT_ID }}
  PUBLIC_SANITY_DATASET: ${{ vars.PUBLIC_SANITY_DATASET }}
  PUBLIC_SANITY_API_VERSION: ${{ vars.PUBLIC_SANITY_API_VERSION }}
  PUBLIC_SANITY_STUDIO_URL: ${{ vars.PUBLIC_SANITY_STUDIO_URL }}

jobs:
  build:
    name: 🏗️ Build Site
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v7

      - name: 🧰 Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: 📄 Setup Pages
        uses: actions/configure-pages@v6

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧹 Lint and typecheck
        run: npm run lint:fix

      - name: 🎨 Check formatting
        run: npm run format:check

      - name: 🔐 Validate Sanity variables
        run: |
          test -n "$PUBLIC_SANITY_PROJECT_ID" || (echo "Missing PUBLIC_SANITY_PROJECT_ID repository variable" && exit 1)
          test -n "$PUBLIC_SANITY_DATASET" || (echo "Missing PUBLIC_SANITY_DATASET repository variable" && exit 1)
          test -n "$PUBLIC_SANITY_API_VERSION" || (echo "Missing PUBLIC_SANITY_API_VERSION repository variable" && exit 1)
          test -n "$PUBLIC_SANITY_STUDIO_URL" || (echo "Missing PUBLIC_SANITY_STUDIO_URL repository variable" && exit 1)

      - name: 🏗️ Build Site
        run: npm run build

      - name: 📤 Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    name: 🚀 Deploy GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
